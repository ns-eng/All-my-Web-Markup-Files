<!DOCTYPE html>
<html>
<head>
<title>M5 - Simple Sentence Generator</title>
</head>
<body>
<h2>Simple Sentence Generator</h2>
<input type="button" id="generateBtn" value="Generate Sentence">
<p id="output"></p>
<script>
/* Create an array */
    let words = new Array("I","like","to","code!","Hip","Hip","Hooray!");
/* Create function that concatenates array into 
a sentence (adding spaces between words), and 
outputs the result to '<p id="output"><p>' innerHTML */
    function generateSentence(){
        for (i = 0; i < words.length; i++){
            let sentence = (words[i] + " ");
            document.getElementById("output").innerHTML += [sentence];
            }
    }
/* Add an event listener to generateBtn.
When clicked, the generateBtn should execute 
the generateSentence function, displaying the sentence. */
    document.getElementById('generateBtn').addEventListener('click', function(){
        document.getElementById("output").innerHTML = "";
         generateSentence()
        });
</script>
</body>
</html>
