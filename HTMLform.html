<!DOCTYPE html>
<html>
<head>
  <script src="HTMLformScript.js" defer></script>
</head>
<body>
<form id="myForm" onsubmit=myForm.preventDefault()></form>
    <label for="first">First Name: <label>
    <br>
    <input type="text" id="first" name="firstName">
    <br>

    <label for="last">Last Name: <label>
    <br>
    <input type="text" id="last" name="lastName">
    <br>

    <label for="course">Course: <label>
    <br>
    <input type="text" id="course" name="Course">
    <br>

    <label for="secNum">Section Number: <label>
    <br>
    <input type="int" id="secNum" name="secNum">
    <br>

    <label for="role">Role (instructor/student): <label>
    <br>
    <input type="text" id="role" name="role">
    <br>

    <button type="submit" id="submit">show JSON</button>
  </form>
  
</body>
</html>
